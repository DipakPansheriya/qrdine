<div class="auth-card">
  <div class="auth-header">
    <div class="logo">
      <div class="qr-icon">
        <div class="square"></div>
        <div class="square"></div>
        <div class="square"></div>
      </div>
      <span>OrderByQR</span>
    </div>
    <h1>Setup Your Password</h1>
    <p>Please change your temporary password to continue.</p>
  </div>

  <div class="error-alert" *ngIf="errorMessage">
    {{ errorMessage }}
  </div>

  <form [formGroup]="passwordForm" (ngSubmit)="changePassword()" class="auth-form">
    <div class="form-group">
      <label>New Password</label>
      <input type="password" formControlName="newPassword" placeholder="Enter new password">
      <div class="error-msg"
        *ngIf="passwordForm.get('newPassword')?.touched && passwordForm.get('newPassword')?.hasError('required')">
        New password is required.
      </div>
      <div class="error-msg"
        *ngIf="passwordForm.get('newPassword')?.touched && passwordForm.get('newPassword')?.hasError('minlength')">
        Password must be at least 6 characters.
      </div>
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" formControlName="confirmPassword" placeholder="Confirm new password">
      <div class="error-msg" *ngIf="passwordForm.get('confirmPassword')?.touched && passwordForm.hasError('mismatch')">
        Passwords do not match.
      </div>
    </div>

    <button type="submit" class="btn-primary" [disabled]="passwordForm.invalid || isLoading">
      <span *ngIf="!isLoading">Save Password & Continue</span>
      <span *ngIf="isLoading" class="spinner"></span>
    </button>
  </form>
</div>
