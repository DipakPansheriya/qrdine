<div class="auth-form-container">
  <h2>Reset Password</h2>
  <p class="subtitle">Enter your email and we'll send you a link to reset your password.</p>

  <div *ngIf="errorMessage" class="error-message">
    {{ errorMessage }}
  </div>

  <div *ngIf="successMessage" class="status-message" style="background: rgba(16, 185, 129, 0.2); color: #34d399; padding: 1rem; border-radius: 8px; text-align: center; margin-bottom: 1.5rem; border: 1px solid rgba(16, 185, 129, 0.5);">
    {{ successMessage }}
  </div>

  <form [formGroup]="forgotPasswordForm" (ngSubmit)="resetPassword()" class="auth-form" *ngIf="!successMessage">
    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" formControlName="email" placeholder="you@example.com" />
      <div *ngIf="forgotPasswordForm.get('email')?.touched && forgotPasswordForm.get('email')?.invalid" class="error-text">
        Please enter a valid email.
      </div>
    </div>

    <button type="submit" class="btn-primary" [disabled]="isLoading() || forgotPasswordForm.invalid">
      {{ isLoading() ? 'Sending...' : 'Send Reset Link' }}
    </button>
  </form>

  <div class="auth-footer">
    <p>Remember your password? <a routerLink="/login" class="text-link">Back to Login</a></p>
  </div>
</div>
