<div class="auth-form-container">
  <h2>Welcome Back</h2>
  <p class="subtitle">Sign in to your account to continue</p>

  <div *ngIf="errorMessage" class="error-message">
    {{ errorMessage }}
  </div>

  <form [formGroup]="loginForm" (ngSubmit)="login()" class="auth-form">
    <div class="form-group">
      <label for="email">Email <span class="req">*</span></label>
      <input type="email" id="email" formControlName="email" placeholder="demo@example.com" />
      <div *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid" class="error-text">
        Please enter a valid email.
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password <span class="req">*</span></label>
      <input type="password" id="password" formControlName="password" placeholder="••••••" />
      <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid" class="error-text">
        Password must be at least 6 characters.
      </div>
    </div>

    <div class="form-actions">
      <label class="remember-me">
        <input type="checkbox" />
        <span>Remember my preference</span>
      </label>
    </div>

    <button type="submit" class="btn-primary" [disabled]="isLoading()">
      {{ isLoading() ? 'Signing in...' : 'Sign In' }}
    </button>
  </form>

  <div class="auth-footer" style="display: flex; justify-content: space-between; align-items: center;">
    <p style="margin: 0;">Don't have an account? <a routerLink="/register" class="text-link">Sign up</a></p>
    <a routerLink="/forgot-password" class="text-link" style="font-size: 0.9rem;">Forgot password?</a>
  </div>
</div>
