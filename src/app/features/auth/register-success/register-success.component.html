<div class="auth-form-container success-container">
  <div class="success-icon-wrap">
    <div class="success-icon-bg"></div>
    <div class="success-icon">
      <mat-icon>check_circle</mat-icon>
    </div>
  </div>

  <h2>Registration Successful!</h2>
  <p class="subtitle">Welcome to QRDine. Your restaurant account has been created and your initial setup is complete.</p>

  <button mat-flat-button 
          color="primary" 
          class="btn-primary-saas" 
          (click)="proceedToLogin()" 
          [disabled]="isLoading()">
    <span *ngIf="!isLoading()" class="btn-content">
      Proceed to Login
      <mat-icon>arrow_forward</mat-icon>
    </span>
    <span *ngIf="isLoading()" class="btn-loading">
      <mat-progress-spinner mode="indeterminate" diameter="20"></mat-progress-spinner>
      <span>Connecting to account...</span>
    </span>
  </button>
</div>
