<div class="dashboard-content">
  <div class="header-actions">
    <h2>Staff Management</h2>
    <button mat-flat-button color="primary" (click)="openStaffForm()">
      <mat-icon>person_add</mat-icon> Add Staff
    </button>
  </div>

  <div class="search-bar">
    <mat-icon>search</mat-icon>
    <input type="text" placeholder="Search staff by name, email, or phone..." [ngModel]="searchQuery()" (ngModelChange)="searchQuery.set($event)">
  </div>

  <div class="table-container mat-elevation-z1">
    <table mat-table [dataSource]="filteredStaff()">
      
      <!-- Name Column -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> Name </th>
        <td mat-cell *matCellDef="let element"> 
          <div class="staff-name-cell">
            <div class="avatar">{{ (element.name || element.displayName || '?').charAt(0).toUpperCase() }}</div>
            <div class="name-info">
              <strong>{{element.name || element.displayName}}</strong>
              <span class="phone">{{element.phone || element.mobile}}</span>
            </div>
          </div>
        </td>
      </ng-container>

      <!-- Email Column -->
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef> Email </th>
        <td mat-cell *matCellDef="let element"> {{element.email}} </td>
      </ng-container>

      <!-- Role Column -->
      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef> Role </th>
        <td mat-cell *matCellDef="let element"> 
          <mat-chip-set>
            <mat-chip [color]="getRoleColor(element.role)" selected>{{element.role}}</mat-chip>
          </mat-chip-set>
        </td>
      </ng-container>

      <!-- Status Column -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef> Status </th>
        <td mat-cell *matCellDef="let element"> 
          <span class="status-badge" [ngClass]="element.status.toLowerCase()">
            {{element.status}}
          </span>
        </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let element">
          <button mat-icon-button color="primary" (click)="openStaffForm(element)" matTooltip="Edit Staff">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button [color]="element.status === 'ACTIVE' ? 'warn' : 'primary'" (click)="toggleStatus(element)" [matTooltip]="element.status === 'ACTIVE' ? 'Disable Staff' : 'Enable Staff'">
            <mat-icon>{{ element.status === 'ACTIVE' ? 'block' : 'check_circle' }}</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      
      <!-- No Data Row -->
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="5" style="text-align: center; padding: 2rem;">
          No staff found matching the criteria.
        </td>
      </tr>
    </table>
  </div>
</div>
