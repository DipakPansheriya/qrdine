<div class="category-header">
  <h3>Categories</h3>
</div>

<mat-nav-list class="category-list">
  <ng-container *ngFor="let category of categories()">
    <div class="list-item-wrapper" [class.active]="selectedCategoryId() === category.categoryId">
      <a mat-list-item (click)="selectCategory(category.categoryId)">
        <span matListItemTitle>{{ category.name }}</span>
        <span matListItemLine *ngIf="category.description" class="cat-desc">{{ category.description }}</span>
      </a>
      
      <button mat-icon-button [matMenuTriggerFor]="menu" class="action-btn">
        <mat-icon>more_vert</mat-icon>
      </button>
      
      <mat-menu #menu="matMenu">
        <button mat-menu-item (click)="editCategory(category.categoryId)">
          <mat-icon>edit</mat-icon>
          <span>Edit</span>
        </button>
        <button mat-menu-item (click)="deleteCategory(category.categoryId)" class="warn-text">
          <mat-icon color="warn">delete</mat-icon>
          <span>Delete</span>
        </button>
      </mat-menu>
    </div>
  </ng-container>

  <div class="empty-state" *ngIf="categories().length === 0 && !isLoading()">
    <mat-icon>folder_open</mat-icon>
    <p>No categories yet</p>
  </div>
</mat-nav-list>
