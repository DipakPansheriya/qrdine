<div class="items-header">
  <h3>Menu Items</h3>
</div>

<div class="items-grid" *ngIf="items().length > 0; else emptyState">
  <mat-card class="item-card" *ngFor="let item of items()">
    <div class="item-image-wrapper" *ngIf="item.image">
      <img [src]="item.image" [alt]="item.name" class="item-image">
    </div>
    <div class="item-image-placeholder" *ngIf="!item.image">
      <mat-icon>restaurant</mat-icon>
    </div>
    
    <mat-card-header>
      <mat-card-title class="item-title">{{ item.name }}</mat-card-title>
      <mat-card-subtitle class="item-price">{{ item.price | currency }}</mat-card-subtitle>
    </mat-card-header>
    
    <mat-card-content>
      <p class="item-desc">{{ item.description || 'No description provided.' }}</p>
      <div class="item-tags">
        <mat-chip [color]="item.vegType === 'Veg' ? 'primary' : (item.vegType === 'Egg' ? 'accent' : 'warn')" selected class="small-chip">
          {{ item.vegType }}
        </mat-chip>
        <mat-chip *ngIf="item.availability !== 'Available'" color="warn" class="small-chip">
          {{ item.availability }}
        </mat-chip>
      </div>
    </mat-card-content>
    
    <mat-card-actions class="item-actions">
      <button mat-icon-button color="primary" (click)="editItem(item.itemId)" matTooltip="Edit Item">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button color="warn" (click)="deleteItem(item.itemId)" matTooltip="Delete Item">
        <mat-icon>delete</mat-icon>
      </button>
    </mat-card-actions>
  </mat-card>
</div>

<ng-template #emptyState>
  <div class="empty-state">
    <ng-container *ngIf="selectedCategoryId(); else noCategory">
      <mat-icon>restaurant_menu</mat-icon>
      <p>No items in this category.</p>
      <p class="sub-text">Click "New Item" to add one.</p>
    </ng-container>
    <ng-template #noCategory>
      <mat-icon>arrow_back</mat-icon>
      <p>Select a category from the left pane.</p>
    </ng-template>
  </div>
</ng-template>
