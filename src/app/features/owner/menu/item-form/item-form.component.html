<h2 mat-dialog-title>{{ isEditMode ? 'Edit Menu Item' : 'New Menu Item' }}</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="item-form">
    <div class="form-row mt-2">
      <mat-form-field appearance="outline" class="flex-2">
        <mat-label>Item Name</mat-label>
        <input matInput formControlName="name" placeholder="E.g. Margherita Pizza" required>
        <mat-error *ngIf="form.get('name')?.hasError('required')">Name is required</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="flex-1">
        <mat-label>Price</mat-label>
        <span matTextPrefix>{{ currency.symbol() }}&nbsp;</span>
        <input matInput type="number" formControlName="price" placeholder="10.00" required step="0.01">
        <mat-error *ngIf="form.get('price')?.hasError('required')">Price is required</mat-error>
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Description (Optional)</mat-label>
      <textarea matInput formControlName="description" rows="2" placeholder="Delicious classic pizza with mozzarella"></textarea>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Image URL (Optional)</mat-label>
      <input matInput formControlName="image" placeholder="https://example.com/image.jpg">
      <mat-icon matSuffix>image</mat-icon>
    </mat-form-field>

    <div class="form-row">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Dietary Type</mat-label>
        <mat-select formControlName="vegType">
          <mat-option value="Veg">Vegetarian</mat-option>
          <mat-option value="Non Veg">Non-Vegetarian</mat-option>
          <mat-option value="Egg">Contains Egg</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Availability</mat-label>
        <mat-select formControlName="availability">
          <mat-option value="Available">Available</mat-option>
          <mat-option value="Out Of Stock">Out Of Stock</mat-option>
          <mat-option value="Hidden">Hidden</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Tax Percentage</mat-label>
      <input matInput type="number" formControlName="taxPercentage" min="0" step="0.1">
      <span matTextSuffix>%</span>
    </mat-form-field>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-flat-button color="primary" (click)="onSubmit()" [disabled]="form.invalid">
    {{ isEditMode ? 'Update' : 'Create' }} Item
  </button>
</mat-dialog-actions>
