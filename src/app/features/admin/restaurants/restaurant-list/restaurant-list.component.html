<div class="page-container">
  <div class="page-header">
    <div>
      <h1 class="page-title">Restaurants</h1>
      <p class="page-subtitle">Manage all tenant restaurants on the QRDine platform.</p>
    </div>
    <button mat-flat-button color="primary" (click)="addRestaurant()">
      <mat-icon>add</mat-icon>
      New Restaurant
    </button>
  </div>

  <mat-progress-bar mode="indeterminate" *ngIf="isLoading()"></mat-progress-bar>

  <div class="table-container mat-elevation-z2" *ngIf="!isLoading()">
    <table mat-table [dataSource]="restaurants()">

      <!-- Name Column -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> Name </th>
        <td mat-cell *matCellDef="let element"> 
          <div class="restaurant-name">
            <strong>{{element.name}}</strong>
          </div>
        </td>
      </ng-container>

      <!-- Slug Column -->
      <ng-container matColumnDef="slug">
        <th mat-header-cell *matHeaderCellDef> Domain Slug </th>
        <td mat-cell *matCellDef="let element"> /q/{{element.slug}} </td>
      </ng-container>

      <!-- Status Column -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef> Status </th>
        <td mat-cell *matCellDef="let element">
          <mat-chip [color]="element.status === 'active' ? 'primary' : 'warn'" selected>
            {{element.status | titlecase}}
          </mat-chip>
        </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="actions-col"> Actions </th>
        <td mat-cell *matCellDef="let element" class="actions-col">
          <button mat-icon-button color="primary" (click)="viewDetails(element.restaurantId)" matTooltip="View Details">
            <mat-icon>visibility</mat-icon>
          </button>
          <button mat-icon-button color="accent" (click)="editRestaurant(element.restaurantId)" matTooltip="Edit">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deleteRestaurant(element.restaurantId)" matTooltip="Delete">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      
      <!-- No Data Row -->
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell empty-cell" colspan="4">No restaurants found. Create one to get started.</td>
      </tr>
    </table>
  </div>
</div>
